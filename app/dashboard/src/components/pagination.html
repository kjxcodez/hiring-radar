<div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-white border border-slate-200 rounded-xl p-4 shadow-sm font-mono text-xs text-slate-600">
  <div class="flex items-center space-x-2">
    <span>Show:</span>
    <select id="page-size-select" class="bg-slate-50 border border-slate-200 rounded px-2.5 py-1 text-slate-800 focus:outline-none transition-colors">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="all">ALL</option>
    </select>
  </div>
  
  <div class="flex items-center space-x-3">
    <button id="prev-page-btn" class="px-3 py-1 rounded bg-slate-50 border border-slate-200 hover:bg-slate-100 disabled:opacity-40 disabled:hover:bg-slate-50 text-slate-700 font-bold transition-colors" aria-label="Previous page">
      &larr;
    </button>
    <span class="text-slate-800">Page <span id="current-page-num" class="font-bold">1</span> of <span id="total-pages-num" class="font-bold">1</span></span>
    <button id="next-page-btn" class="px-3 py-1 rounded bg-slate-50 border border-slate-200 hover:bg-slate-100 disabled:opacity-40 disabled:hover:bg-slate-50 text-slate-700 font-bold transition-colors" aria-label="Next page">
      &rarr;
    </button>
  </div>
</div>
