<div class="bg-white border border-slate-200 rounded-xl p-5 shadow-sm space-y-4">
  <div class="text-xs font-bold font-mono text-indigo-600 uppercase tracking-wider flex items-center space-x-2">
    <span class="inline-block h-2 w-2 rounded-full bg-indigo-600"></span>
    <span>Filters</span>
  </div>
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
    <!-- Search Input -->
    <div class="lg:col-span-2">
      <label for="search-input" class="block text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider mb-2">Search Companies</label>
      <input type="text" id="search-input" placeholder="Search companies..." class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm text-slate-950 placeholder-slate-400 focus:outline-none transition-colors">
    </div>
    <!-- Source select -->
    <div>
      <label for="source-select" class="block text-[10px] font-bold font-mono text-slate-400 uppercase tracking-wider mb-2">Source / ATS</label>
      <select id="source-select" class="w-full bg-slate-50 border border-slate-200 rounded px-3 py-2 text-sm text-slate-950 focus:outline-none transition-colors font-mono">
        <option value="all">ALL SOURCES</option>
      </select>
    </div>
    <!-- Checkboxes -->
    <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-3 gap-2">
      <label class="flex items-center space-x-2 text-xs font-mono text-slate-600 cursor-pointer select-none py-2 hover:text-indigo-600">
        <input type="checkbox" id="remote-check" class="rounded border-slate-200 bg-slate-50 text-indigo-600 focus:ring-0">
        <span>Remote Only</span>
      </label>
      <label class="flex items-center space-x-2 text-xs font-mono text-slate-600 cursor-pointer select-none py-2 hover:text-indigo-600">
        <input type="checkbox" id="email-check" class="rounded border-slate-200 bg-slate-50 text-indigo-600 focus:ring-0">
        <span>Has Email</span>
      </label>
      <label class="flex items-center space-x-2 text-xs font-mono text-slate-600 cursor-pointer select-none py-2 hover:text-indigo-600">
        <input type="checkbox" id="ai-check" class="rounded border-slate-200 bg-slate-50 text-indigo-600 focus:ring-0">
        <span>Has AI Summary</span>
      </label>
    </div>
  </div>
</div>

<!-- Results Counter -->
<div class="text-xs font-mono text-slate-500 flex items-center justify-between px-1">
  <div id="results-counter">
    Showing <span class="text-slate-900 font-bold" id="count-visible-range">0–0</span> of <span class="text-slate-900 font-bold" id="count-visible">0</span> filtered companies (from <span id="count-total">0</span> total)
  </div>
  <div class="flex items-center space-x-3 text-[10px] text-slate-400">
    <span class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-[#10b981]"></span><span>READY</span></span>
    <span class="flex items-center space-x-1"><span class="h-2 w-2 rounded-full bg-[#f59e0b] pulse-amber"></span><span>ACTION REQUIRED</span></span>
  </div>
</div>
